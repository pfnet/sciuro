version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - decorder
    - dogsled
    - errorlint
    - gochecknoinits
    - goconst
    - gocritic
    - godox
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unparam
  settings:
    gocritic:
      disabled-checks:
        - commentFormatting
        - exitAfterDefer
        - hugeParam
        - ifElseChain
        - rangeValCopy
        - unnecessaryBlock
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    godox:
      keywords:
        - HACK
        - XXX
    misspell:
      locale: US
      ignore-rules:
        - clas
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
